	<script type="text/javascript">
		function vot5(s) {
            return s.replace(/[aeiouAEIOU]/g, function (c) {
                return ((Math.random() < 0.98) ? {
                    'a': 'e', 'e': 'i', 'i': 'o', 'o': 'u', 'u': 'a',
                    'A': 'E', 'E': 'I', 'I': 'O', 'O': 'U', 'U': 'A'
                }[c] : c);
            }); /* fuck yr idempotency :^} */
		}     
		function update() {
			document.getElementById('output').value = vot5(document.getElementById('input').value);
		}
	</script>
	
</head>
<body>

<h1>vote five [dot] live</h1>
<h2><a href="https://twitter.com/Virtual1nstinct/status/1406653629931474946">what is this</a></h2>

<noscript><p><span class="warning"><em>Please enable JavaScript to use this page.</em></span></p></noscript>

<p><textarea id="input" cols="120" rows="8" onkeyup="update()" onchange="update()" autofocus></textarea></p>

<p class="arrow">↓</p>

<p><textarea id="output" cols="120" rows="24" readonly></textarea></p>
